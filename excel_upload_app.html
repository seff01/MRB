<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory Count Scanner</title>
<style>
  :root {
    --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb; --muted:#9ca3af;
    --accent:#22c55e; --accent2:#3b82f6; --danger:#ef4444; --warn:#f59e0b; --line:#374151;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Arial, Helvetica, sans-serif; background:linear-gradient(135deg,#0b1220,#101827); color:var(--text); }
  .wrap { max-width: 1200px; margin: 18px auto; padding: 14px; }
  .card { background: rgba(17,24,39,.95); border:1px solid var(--line); border-radius: 14px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
  h1 { margin:0 0 8px 0; font-size: 24px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .tabs { display:flex; gap:8px; margin-bottom: 12px; flex-wrap:wrap; }
  .tab-btn {
    background: #0b1220; color: var(--text); border:1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; cursor:pointer; font-weight:600;
  }
  .tab-btn.active { background: #1d4ed8; border-color:#2563eb; }
  .tab-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }
  .toolbar { display:grid; grid-template-columns: 1.3fr 1.3fr .8fr 1fr .9fr; gap:10px; margin-bottom:10px; }
  .button-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .top-data-row { justify-content:flex-end; }
  .button-row button { min-width:126px; }
  .button-row .spacer { flex:1; }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font-size: 12px; color: var(--muted); }
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 56px;
    height: 30px;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #1f2937;
    border: 1px solid var(--line);
    transition: .2s;
    border-radius: 999px;
  }
  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    top: 3px;
    background: #e5e7eb;
    transition: .2s;
    border-radius: 50%;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: #15803d;
    border-color: #22c55e;
  }
  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(26px);
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 44px;
    padding: 0 8px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: rgba(255,255,255,.03);
  }
  .toggle-label {
    font-size: 12px;
    color: var(--muted);
  }
  input {
    background:#0b1220; border:1px solid var(--line); color:var(--text); border-radius:10px;
    padding: 10px 12px; font-size: 15px; width:100%;
  }
  input:focus { outline:none; border-color:#60a5fa; box-shadow:0 0 0 2px rgba(96,165,250,.15); }
  button {
    background:#0b1220; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px 11px; cursor:pointer; font-weight:600;
    align-self:end; min-height:40px; font-size:13px;
  }
  button.primary { background:#15803d; border-color:#22c55e; }
  button.danger { background:#7f1d1d; border-color:#ef4444; }
  button.secondary { background:#1d4ed8; border-color:#3b82f6; }
  button:disabled {
    opacity: .45;
    cursor: not-allowed;
  }
  .status { margin: 6px 0 12px; font-size: 13px; }
  .status.ok { color:#86efac; }
  .status.warn { color:#fcd34d; }
  .status.err { color:#fca5a5; }
  .metrics { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .pill { background:#0b1220; border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:13px; }
  .hidden { display:none; }
  table { width:100%; border-collapse: collapse; }
  th, td { border-bottom:1px solid var(--line); padding:8px 10px; text-align:left; font-size:13px; }
  th { color:#cbd5e1; position: sticky; top:0; background:#111827; z-index: 2; }
  .table-wrap { max-height: 460px; overflow:auto; border:1px solid var(--line); border-radius: 12px; }
  .right { text-align:right; }
  .muted { color:var(--muted); }
  .row-dup { background: rgba(245,158,11,.08); }
  .row-notfound { background: rgba(239,68,68,.08); }
  .controls2 { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 12px; }
  .rack-row { cursor:pointer; }
  .rack-row:hover { background: rgba(59,130,246,.08); }
  .rack-subtable { margin: 8px 0 12px; width:100%; border-collapse: collapse; }
  .rack-subtable th, .rack-subtable td { border:1px solid var(--line); padding:6px 8px; font-size:12px; }
  .rack-subtable th { color: var(--muted); text-align:left; background:#0b1220; }
  .rack-detail-cell { background: rgba(11,18,32,.55); padding:8px; }
  .explorer-pallet-row, .explorer-box-row { cursor:pointer; }
  .explorer-pallet-row:hover, .explorer-box-row:hover { background: rgba(59,130,246,.08); }
  .explorer-detail-cell { background: rgba(11,18,32,.55); padding:8px; }
  .qr-thumb {
    width: 64px;
    height: 64px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    padding: 4px;
    object-fit: contain;
  }

  @media (max-width: 900px) {
    .toolbar { grid-template-columns: 1fr; }
    button { width:100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Inventory Count Scanner</h1>

    <div class="tabs">
      <button class="tab-btn" data-tab="summaryTab">Summary by PN-R</button>
      <button class="tab-btn active" data-tab="racksTab">Pallets</button>
      <button class="tab-btn" data-tab="explorerTab">Pallet Explorer</button>
    </div>

    <div class="button-row top-data-row">
      <button id="loadLookupBtn" class="secondary">Load Lookup File</button>
      <input id="lookupFileInput" type="file" accept=".xlsx,.xls,.xlsm,.xlsb,.csv,.txt,.xml" class="hidden" />
      <button id="clearLookupBtn">Clear Lookup</button>
      <button id="importMergeBtn">Import & Merge Data</button>
      <input id="importMergeFileInput" type="file" accept=".xlsx,.xls,.xlsm,.xlsb,.xml,.csv,.txt" class="hidden" />
      <button id="exportDataBtn" class="secondary">Export Data</button>
      <button id="exportExplorerWordBtn" class="secondary">Export 3rd Tab to Word</button>
    </div>

    <div class="toolbar">
      <div class="field">
        <label for="serialInput">Serial Number</label>
        <input id="serialInput" autocomplete="off" />
      </div>
      <div class="field">
        <label for="pnrInput">PN-R / GPN</label>
        <input id="pnrInput" autocomplete="off" />
      </div>
      <div class="field">
        <label for="initialsInput">Initials</label>
        <input id="initialsInput" autocomplete="off" maxlength="8" />
      </div>
      <div class="field">
        <label for="rackInput">Active Pallet ID</label>
        <input id="rackInput" autocomplete="off" maxlength="24" readonly />
      </div>
      <div class="field">
        <label for="autoSubmitToggle">Auto Submit</label>
        <label class="toggle-row" for="autoSubmitToggle">
          <span class="toggle-switch">
            <input id="autoSubmitToggle" type="checkbox" checked />
            <span class="toggle-slider"></span>
          </span>
          <span class="toggle-label">Enabled</span>
        </label>
      </div>
      <div id="qrTransferField" class="field hidden">
        <label for="qrTransferInput">Pallet QR Transfer</label>
        <input id="qrTransferInput" autocomplete="off" placeholder="Scan pallet transfer QR and press Enter" />
      </div>
    </div>
    <div class="button-row">
      <button id="addRackBtn" class="secondary">Start New Pallet</button>
      <button id="closeNotInListPalletBtn" class="secondary">Close Pallet</button>
      <button id="addBtn" class="primary">Add Entry</button>
      <span class="spacer"></span>
      <button id="undoBtn">Undo Last</button>
      <button id="clearBtn" class="danger">Clear All</button>
    </div>
    <div id="statusMsg" class="status muted"></div>

    <div class="metrics">
      <div class="pill">Active Pallet: <strong id="activePalletId">-</strong></div>
      <div class="pill">Pallet GPN Lock: <strong id="activePalletLock">-</strong></div>
    </div>

    <div class="metrics">
      <div class="pill">Total Scans: <strong id="totalScans">0</strong></div>
      <div class="pill">Unique Serials: <strong id="uniqueSerials">0</strong></div>
      <div class="pill">Unique PN-R: <strong id="uniquePnrs">0</strong></div>
      <div class="pill">Lookup Map Entries: <strong id="mapCount">0</strong></div>
    </div>

    <div id="summaryTab" class="tab-panel hidden">
      <div class="table-wrap">
        <table id="summaryTable">
          <thead>
            <tr>
              <th style="width:50px;">#</th>
              <th>PN-R</th>
              <th class="right" style="width:120px;">Count</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="racksTab" class="tab-panel">
      <div class="table-wrap">
        <table id="racksTable">
          <thead>
            <tr>
              <th style="width:50px;">#</th>
              <th>Pallet ID</th>
              <th class="right" style="width:120px;">Total Scans</th>
              <th class="right" style="width:140px;">Unique Serials</th>
              <th class="right" style="width:120px;">Unique PN-R</th>
              <th style="width:110px;">Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="explorerTab" class="tab-panel hidden">
      <div class="table-wrap">
        <table id="explorerTable">
          <thead>
            <tr>
              <th style="width:50px;">#</th>
              <th>Pallet ID</th>
              <th style="width:90px;">QR</th>
              <th class="right" style="width:140px;">Unique Box IDs</th>
              <th class="right" style="width:140px;">Unique SNs</th>
              <th style="width:110px;">Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script>
const LOOKUP_MAP_KEY = "inventory_lookup_map_v1";
const LOOKUP_BOX_MAP_KEY = "inventory_lookup_box_map_v1";
const STORAGE_KEY = "inventory_count_scans_v1";
const AUTO_SUBMIT_KEY = "inventory_count_auto_submit_enabled_v1";
const PALLET_COUNTER_KEY = "inventory_pallet_counter_v1";
const ACTIVE_PALLET_ID_KEY = "inventory_active_pallet_id_v1";
const ACTIVE_PALLET_GPN_LOCK_KEY = "inventory_active_pallet_gpn_lock_v1";
const PALLET_REGISTRY_KEY = "inventory_pallet_registry_v1";
const PALLET_QR_PAYLOAD_PREFIX = "MRBQR1";
const ACTIVE_NOT_IN_LIST_PALLET_KEY = "inventory_not_in_list_active_pallet_v1";
const NOT_IN_LIST_PALLET_PREFIX = "NOT IN LIST";

const serialInput = document.getElementById("serialInput");
const pnrInput = document.getElementById("pnrInput");
const initialsInput = document.getElementById("initialsInput");
const rackInput = document.getElementById("rackInput");
const autoSubmitToggle = document.getElementById("autoSubmitToggle");
const qrTransferInput = document.getElementById("qrTransferInput");
const qrTransferField = document.getElementById("qrTransferField");
const addRackBtn = document.getElementById("addRackBtn");
const closeNotInListPalletBtn = document.getElementById("closeNotInListPalletBtn");
const addBtn = document.getElementById("addBtn");
const undoBtn = document.getElementById("undoBtn");
const clearBtn = document.getElementById("clearBtn");
const loadLookupBtn = document.getElementById("loadLookupBtn");
const lookupFileInput = document.getElementById("lookupFileInput");
const clearLookupBtn = document.getElementById("clearLookupBtn");
const importMergeBtn = document.getElementById("importMergeBtn");
const importMergeFileInput = document.getElementById("importMergeFileInput");
const exportDataBtn = document.getElementById("exportDataBtn");
const exportExplorerWordBtn = document.getElementById("exportExplorerWordBtn");
const statusMsg = document.getElementById("statusMsg");
const totalScansEl = document.getElementById("totalScans");
const uniqueSerialsEl = document.getElementById("uniqueSerials");
const uniquePnrsEl = document.getElementById("uniquePnrs");
const mapCountEl = document.getElementById("mapCount");
const activePalletIdEl = document.getElementById("activePalletId");
const activePalletLockEl = document.getElementById("activePalletLock");
const summaryTbody = document.querySelector("#summaryTable tbody");
const detailsTbody = document.querySelector("#detailsTable tbody");
const racksTbody = document.querySelector("#racksTable tbody");
const explorerTbody = document.querySelector("#explorerTable tbody");
const filterInput = document.getElementById("filterInput");
const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));

let scans = loadScans();
let serialToPnr = loadLookupMap();
let serialToBoxId = loadLookupBoxMap();
let palletCounters = loadPalletCounters();
let palletRegistry = loadPalletRegistry();
let currentPalletId = normalize(rackInput?.value || "");
let currentPalletGpnLock = "";
let activeNotInListPalletId = loadActiveNotInListPalletId();
const expandedPallets = new Set();
const expandedExplorerPallets = new Set();
const expandedExplorerBoxes = new Set();
const palletQrCache = new Map();
const savedPalletState = loadActivePalletState();
if (savedPalletState.id) currentPalletId = savedPalletState.id;
if (savedPalletState.lock) currentPalletGpnLock = savedPalletState.lock;
syncPalletRegistryFromScans();

function loadAutoSubmitEnabled() {
  try {
    const raw = localStorage.getItem(AUTO_SUBMIT_KEY);
    if (raw === null) return true;
    return raw === "true";
  } catch {
    return true;
  }
}

function persistAutoSubmitEnabled(enabled) {
  try {
    localStorage.setItem(AUTO_SUBMIT_KEY, String(!!enabled));
  } catch {}
}

function isAutoSubmitEnabled() {
  return !!autoSubmitToggle?.checked;
}

function nowStamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function setStatus(text, type="muted") {
  statusMsg.textContent = text;
  statusMsg.className = "status " + type;
}

let _audioCtx = null;
function playDuplicateSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    if (!_audioCtx) _audioCtx = new AudioCtx();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    const now = _audioCtx.currentTime;
    const gain = _audioCtx.createGain();
    gain.connect(_audioCtx.destination);

    const pulse = (freq, start, dur=0.08) => {
      const osc = _audioCtx.createOscillator();
      osc.type = "square";
      osc.frequency.setValueAtTime(freq, start);
      osc.connect(gain);
      osc.start(start);
      osc.stop(start + dur);
    };

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
    gain.gain.setValueAtTime(0.0001, now + 0.10);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.11);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.19);

    pulse(880, now);
    pulse(660, now + 0.10);
  } catch (e) {
    console.warn("Duplicate sound failed:", e);
  }
}

function playNotInListSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    if (!_audioCtx) _audioCtx = new AudioCtx();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    const now = _audioCtx.currentTime;
    const gain = _audioCtx.createGain();
    gain.connect(_audioCtx.destination);

    const pulse = (freq, start, dur = 0.07) => {
      const osc = _audioCtx.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, start);
      osc.connect(gain);
      osc.start(start);
      osc.stop(start + dur);
    };

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.11, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

    pulse(1180, now);
    pulse(980, now + 0.08);
    pulse(780, now + 0.16);
  } catch (e) {
    console.warn("Not-in-list sound failed:", e);
  }
}

function normalize(v) {
  return (v ?? "").toString().trim().toUpperCase();
}

function formatBoxIdDisplay(value) {
  const raw = normalize(value);
  if (!raw) return "";
  if (raw.startsWith("BOX - ")) return raw;
  if (raw.startsWith("BOX-")) return `BOX - ${raw.slice(4).trim()}`;
  if (raw.startsWith("BOX")) return `BOX - ${raw.slice(3).replace(/^[-\s]+/, "").trim()}`;
  return `BOX - ${raw}`;
}

function sanitizeQrField(value) {
  return (value ?? "").toString().replace(/[|^~\r\n]/g, " ").trim();
}

function buildPalletQrPayloadText(palletId) {
  const normalizedPalletId = normalize(palletId);
  const palletRows = scans.filter(row => normalize(row.palletId || row.rack) === normalizedPalletId);
  const gpnSet = Array.from(new Set(palletRows.map(row => normalize(row.pnr || "")).filter(Boolean)));
  const initialsSet = Array.from(new Set(palletRows.map(row => normalize(row.initials || "")).filter(Boolean)));
  const sharedGpn = gpnSet.length === 1 ? gpnSet[0] : "";
  const sharedInitials = initialsSet.length === 1 ? initialsSet[0] : "";
  const rowsToken = palletRows
    .map(row => {
      const serial = sanitizeQrField(normalize(row.serial || ""));
      if (!serial) return "";
      const boxId = sanitizeQrField(formatBoxIdDisplay(row.l10BoxId || ""));
      const pnr = sanitizeQrField(normalize(row.pnr || ""));
      const initials = sanitizeQrField(normalize(row.initials || ""));
      const rowPnr = sharedGpn && pnr === sharedGpn ? "" : pnr;
      const rowInitials = sharedInitials && initials === sharedInitials ? "" : initials;
      return [serial, boxId, rowPnr, rowInitials].join("~");
    })
    .filter(Boolean)
    .join("^");
  return [
    PALLET_QR_PAYLOAD_PREFIX,
    `P=${sanitizeQrField(normalizedPalletId)}`,
    `G=${sanitizeQrField(sharedGpn)}`,
    `I=${sanitizeQrField(sharedInitials)}`,
    `R=${rowsToken}`
  ].join("|");
}

function isPalletQrTransferPayloadCandidate(value) {
  const raw = (value ?? "").toString().trim();
  if (!raw) return false;
  return raw.toUpperCase().startsWith(`${PALLET_QR_PAYLOAD_PREFIX}|`);
}

function parsePalletQrTransferPayload(value) {
  const raw = (value ?? "").toString().trim();
  if (!isPalletQrTransferPayloadCandidate(raw)) return null;
  const parts = raw.split("|");
  if (normalize(parts[0]) !== PALLET_QR_PAYLOAD_PREFIX) return null;
  const map = {};
  parts.slice(1).forEach(part => {
    const idx = part.indexOf("=");
    if (idx <= 0) return;
    const key = part.slice(0, idx).trim().toUpperCase();
    const val = part.slice(idx + 1);
    map[key] = val;
  });
  const rows = (map.R || "")
    .split("^")
    .filter(Boolean)
    .map(token => {
      const [serial = "", boxId = "", pnr = "", initials = ""] = token.split("~");
      return [serial, boxId, pnr, initials];
    });
  return {
    palletId: normalize(map.P || ""),
    sharedGpn: normalize(map.G || ""),
    sharedInitials: normalize(map.I || ""),
    rows
  };
}

function importPalletFromQrPayload(payload) {
  const palletId = normalize(payload?.palletId || "");
  if (!palletId) {
    setStatus("Scanned QR payload is invalid (missing pallet ID).", "err");
    return false;
  }

  const sharedGpn = normalize(payload?.sharedGpn || "");
  const sharedInitials = normalize(payload?.sharedInitials || "");
  const rows = Array.isArray(payload?.rows) ? payload.rows : [];
  const existingSerials = new Set(scans.map(row => normalize(row.serial || "")));
  let added = 0;
  let skippedDuplicates = 0;
  let skippedInvalid = 0;
  let skippedMissingGpn = 0;

  rows.forEach(row => {
    if (!Array.isArray(row)) {
      skippedInvalid++;
      return;
    }
    const serial = normalize(row[0] || "");
    if (!serial) {
      skippedInvalid++;
      return;
    }
    if (existingSerials.has(serial)) {
      skippedDuplicates++;
      return;
    }
    const rowBoxId = formatBoxIdDisplay(row[1] || "") || serialToBoxId[serial] || "";
    const rowPnr = normalize(row[2] || "") || sharedGpn || serialToPnr[serial] || "";
    if (!rowPnr) {
      skippedMissingGpn++;
      return;
    }
    const rowInitials = normalize(row[3] || "") || sharedInitials || normalize(initialsInput.value) || "QR";
    scans.push({
      ts: nowStamp(),
      serial,
      l10BoxId: rowBoxId,
      pnr: rowPnr,
      initials: rowInitials,
      palletId,
      rack: palletId,
      lookupFound: !!serialToPnr[serial],
      duplicate: false
    });
    existingSerials.add(serial);
    added++;
  });

  if (!rows.length) {
    setActivePallet(palletId, sharedGpn);
    updateActivePalletState();
    renderAll();
    setStatus(`Pallet QR scanned: ${palletId}. No row data found in payload.`, "warn");
    serialInput.value = "";
    pnrInput.value = "";
    serialInput.focus();
    return true;
  }

  if (added > 0) {
    persistScans();
    palletQrCache.clear();
    setActivePallet(palletId, sharedGpn);
    updateActivePalletState();
    renderAll();
  }

  const messageParts = [`Imported pallet ${palletId} from QR: ${added} added`];
  if (skippedDuplicates) messageParts.push(`${skippedDuplicates} duplicates skipped`);
  if (skippedMissingGpn) messageParts.push(`${skippedMissingGpn} missing GPN skipped`);
  if (skippedInvalid) messageParts.push(`${skippedInvalid} invalid skipped`);
  setStatus(`${messageParts.join(", ")}.`, added > 0 ? "ok" : "warn");
  serialInput.value = "";
  pnrInput.value = "";
  serialInput.focus();
  return true;
}

function importPalletFromQrTransferInput() {
  const raw = (qrTransferInput?.value ?? "").toString().trim();
  if (!raw) {
    setStatus("Scan a pallet transfer QR code into the transfer field first.", "warn");
    qrTransferInput?.focus();
    return false;
  }
  const parsed = parsePalletQrTransferPayload(raw);
  if (!parsed) {
    setStatus("Scanned value is not a pallet transfer QR payload from this app.", "err");
    qrTransferInput?.select?.();
    qrTransferInput?.focus();
    return false;
  }
  const imported = importPalletFromQrPayload(parsed);
  if (imported && qrTransferInput) qrTransferInput.value = "";
  return imported;
}

function loadPalletCounters() {
  try {
    const raw = localStorage.getItem(PALLET_COUNTER_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};
    const cleaned = {};
    Object.entries(parsed).forEach(([key, value]) => {
      const n = Number.parseInt(value, 10);
      if (!Number.isFinite(n) || n < 0) return;
      cleaned[key] = n;
    });
    return cleaned;
  } catch {
    return {};
  }
}

function persistPalletCounters() {
  try {
    localStorage.setItem(PALLET_COUNTER_KEY, JSON.stringify(palletCounters));
  } catch {}
}

function loadPalletRegistry() {
  try {
    const raw = localStorage.getItem(PALLET_REGISTRY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    const deduped = new Set();
    parsed.forEach(value => {
      const id = normalize(value);
      if (id) deduped.add(id);
    });
    return Array.from(deduped);
  } catch {
    return [];
  }
}

function persistPalletRegistry() {
  try {
    localStorage.setItem(PALLET_REGISTRY_KEY, JSON.stringify(palletRegistry));
  } catch {}
}

function registerPalletId(palletId) {
  const normalized = normalize(palletId);
  if (!normalized) return;
  if (palletRegistry.includes(normalized)) return;
  palletRegistry.push(normalized);
  palletRegistry.sort((a, b) => b.localeCompare(a));
  persistPalletRegistry();
}

function syncPalletRegistryFromScans() {
  let changed = false;
  scans.forEach(row => {
    const id = normalize(row.palletId || row.rack);
    if (!id || palletRegistry.includes(id)) return;
    palletRegistry.push(id);
    changed = true;
  });
  if (changed) {
    palletRegistry.sort((a, b) => b.localeCompare(a));
    persistPalletRegistry();
  }
}

function persistActivePalletState() {
  try {
    if (currentPalletId) localStorage.setItem(ACTIVE_PALLET_ID_KEY, currentPalletId);
    else localStorage.removeItem(ACTIVE_PALLET_ID_KEY);
    if (currentPalletGpnLock) localStorage.setItem(ACTIVE_PALLET_GPN_LOCK_KEY, currentPalletGpnLock);
    else localStorage.removeItem(ACTIVE_PALLET_GPN_LOCK_KEY);
  } catch {}
}

function loadActivePalletState() {
  try {
    const id = normalize(localStorage.getItem(ACTIVE_PALLET_ID_KEY) || "");
    const lock = normalize(localStorage.getItem(ACTIVE_PALLET_GPN_LOCK_KEY) || "");
    return { id, lock };
  } catch {
    return { id: "", lock: "" };
  }
}

function loadActiveNotInListPalletId() {
  try {
    return normalize(localStorage.getItem(ACTIVE_NOT_IN_LIST_PALLET_KEY) || "");
  } catch {
    return "";
  }
}

function persistActiveNotInListPalletId() {
  try {
    if (activeNotInListPalletId) {
      localStorage.setItem(ACTIVE_NOT_IN_LIST_PALLET_KEY, activeNotInListPalletId);
    } else {
      localStorage.removeItem(ACTIVE_NOT_IN_LIST_PALLET_KEY);
    }
  } catch {}
}

function getPalletLockGpn(palletId) {
  const normalized = normalize(palletId);
  if (!normalized) return "";
  const lockSource = scans.find(row => normalize(row.palletId || row.rack) === normalized && normalize(row.pnr));
  return normalize(lockSource?.pnr || "");
}

function buildPalletSequenceKey(initials, dateStamp) {
  return `${initials}|${dateStamp}`;
}

function padPalletSequence(seq) {
  return String(seq).padStart(4, "0");
}

function generatePalletId(initials) {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  const dateStamp = `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
  const key = buildPalletSequenceKey(initials, dateStamp);
  const next = (palletCounters[key] || 0) + 1;
  palletCounters[key] = next;
  persistPalletCounters();
  return `${initials}-${dateStamp}-${padPalletSequence(next)}`;
}

function generateNotInListPalletId() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  const dateStamp = `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
  const key = buildPalletSequenceKey("NOT_IN_LIST", dateStamp);
  const next = (palletCounters[key] || 0) + 1;
  palletCounters[key] = next;
  persistPalletCounters();
  return `${NOT_IN_LIST_PALLET_PREFIX}-${dateStamp}-${padPalletSequence(next)}`;
}

function resolveNotInListPalletForScan() {
  const existing = normalize(activeNotInListPalletId);
  const hasRows = existing
    ? scans.some(row => normalize(row.palletId || row.rack) === existing)
    : false;

  if (existing && hasRows) {
    const continueSame = confirm(
      `SN is not in the uploaded list.\n\nActive Not In List pallet: ${existing}\n\nDo you want to continue using the same pallet for SN that are not in the list?\n\nPress OK to Continue.\nPress Cancel to Close Pallet and create a new Not In List pallet.`
    );
    if (continueSame) return existing;
  }

  const newPalletId = generateNotInListPalletId();
  activeNotInListPalletId = newPalletId;
  persistActiveNotInListPalletId();
  registerPalletId(newPalletId);
  return newPalletId;
}

function closeActiveNotInListPallet(options = {}) {
  const silent = !!options.silent;
  const existing = normalize(activeNotInListPalletId);
  if (!existing) {
    if (!silent) setStatus('No active "Not In List" pallet to close.', "warn");
    return false;
  }
  activeNotInListPalletId = "";
  persistActiveNotInListPalletId();
  if (!silent) setStatus(`Closed Not In List pallet: ${existing}.`, "ok");
  return true;
}

function setActivePallet(palletId, lockGpn = "") {
  currentPalletId = normalize(palletId);
  currentPalletGpnLock = normalize(lockGpn);
  if (currentPalletId) registerPalletId(currentPalletId);
  if (rackInput) rackInput.value = currentPalletId;
  if (activePalletIdEl) activePalletIdEl.textContent = currentPalletId || "-";
  if (activePalletLockEl) activePalletLockEl.textContent = currentPalletGpnLock || "-";
  persistActivePalletState();
}

function syncActivePalletLockFromScans() {
  if (!currentPalletId) {
    currentPalletGpnLock = "";
    return;
  }
  const lockSource = scans.find(row => normalize(row.palletId || row.rack) === currentPalletId && normalize(row.pnr));
  currentPalletGpnLock = normalize(lockSource?.pnr || "");
}

function updateActivePalletState() {
  syncActivePalletLockFromScans();
  setActivePallet(currentPalletId, currentPalletGpnLock);
}

function startNewPallet() {
  if (!enforceLookupGate()) return;
  const initials = normalize(initialsInput.value);
  if (!initials) {
    setStatus("Enter initials first, then start a new pallet.", "err");
    initialsInput.focus();
    return;
  }
  const palletId = generatePalletId(initials);
  setActivePallet(palletId, "");
  closeActiveNotInListPallet({ silent: true });
  renderPalletQr({ silent: true, palletId });
  setStatus(`New pallet started: ${palletId}. Pallet will lock to the first PN-R/GPN scanned.`, "ok");
  serialInput.focus();
}

function buildPalletQrDataUrl(qrValue) {
  if (window.QRCode && window.QRCode.toDataURL) {
    return new Promise((resolve, reject) => {
      window.QRCode.toDataURL(
        qrValue,
        { width: 280, margin: 1, errorCorrectionLevel: "M", color: { dark: "#000000", light: "#FFFFFF" } },
        (err, url) => (err ? reject(err) : resolve(url))
      );
    });
  }
  // Fallback for strict file:// environments where CDN scripts are blocked.
  return Promise.resolve(
    `https://api.qrserver.com/v1/create-qr-code/?size=280x280&format=png&data=${encodeURIComponent(qrValue)}`
  );
}

async function getPalletQrUrl(palletId) {
  const normalized = normalize(palletId);
  if (!normalized) return "";
  const payload = buildPalletQrPayloadText(normalized);
  const payloadCacheKey = `${normalized}::${payload}`;
  if (palletQrCache.has(payloadCacheKey)) return palletQrCache.get(payloadCacheKey);
  try {
    const url = await buildPalletQrDataUrl(payload);
    palletQrCache.set(payloadCacheKey, url);
    return url;
  } catch (err) {
    console.warn(`Pallet QR payload overflow for ${normalized}; falling back to pallet-id-only QR.`, err);
    const idOnlyKey = `${normalized}::ID_ONLY`;
    if (palletQrCache.has(idOnlyKey)) return palletQrCache.get(idOnlyKey);
    const fallbackUrl = await buildPalletQrDataUrl(normalized);
    palletQrCache.set(idOnlyKey, fallbackUrl);
    return fallbackUrl;
  }
}

async function renderPalletQr(options = {}) {
  if (!enforceLookupGate()) return;
  const silent = !!options.silent;
  const targetPalletId = normalize(options.palletId || currentPalletId);
  if (!targetPalletId) {
    if (!silent) setStatus("Start a pallet before generating a QR code.", "warn");
    return;
  }
  try {
    await getPalletQrUrl(targetPalletId);
    if (!silent) {
      expandedExplorerPallets.add(targetPalletId);
      await renderPalletExplorer();
      activateTab("explorerTab");
    }
    if (!silent) {
      setStatus(
        window.QRCode && window.QRCode.toDataURL
          ? `QR code ready for pallet ${targetPalletId}. Opened in Pallet Explorer.`
          : `QR code ready via fallback service for pallet ${targetPalletId}. Opened in Pallet Explorer.`,
        "ok"
      );
    }
  } catch (e) {
    console.error(e);
    if (!silent) setStatus("Failed to generate pallet QR code.", "err");
  }
}

function initializeAutoSubmitToggle() {
  if (!autoSubmitToggle) return;
  autoSubmitToggle.checked = loadAutoSubmitEnabled();
  autoSubmitToggle.addEventListener("change", () => {
    persistAutoSubmitEnabled(autoSubmitToggle.checked);
    if (autoSubmitTimer) {
      clearTimeout(autoSubmitTimer);
      autoSubmitTimer = null;
    }
    setStatus(
      autoSubmitToggle.checked
        ? "Auto Submit enabled. Serial scans and required PN-R / GPN scans will submit automatically."
        : "Auto Submit disabled. Use Enter or click Add Entry to submit.",
      autoSubmitToggle.checked ? "ok" : "warn"
    );
    serialInput.focus();
  });
}

function autoFillPNR() {
  const rawSerial = (serialInput.value ?? "").toString().trim();
  if (isPalletQrTransferPayloadCandidate(rawSerial)) {
    pnrInput.value = "";
    setStatus("Pallet transfer QR detected. Press Enter to import this pallet data.", "ok");
    return;
  }
  const sn = normalize(rawSerial);
  if (!sn) {
    pnrInput.value = "";
    return;
  }
  const found = serialToPnr[sn];
  if (found) {
    pnrInput.value = found;
    setStatus(`Match found: ${sn} → ${found}`, "ok");
  } else {
    pnrInput.value = "";
    setStatus(`No match found for serial: ${sn}. Scan PN-R/GPN manually; item will be routed to a Not In List pallet.`, "warn");
  }
}

function hasLookupData() {
  return Object.keys(serialToPnr).length > 0 || Object.keys(serialToBoxId).length > 0;
}

function setFeaturesEnabled(enabled) {
  const guardedElements = [
    serialInput,
    pnrInput,
    initialsInput,
    autoSubmitToggle,
    addRackBtn,
    closeNotInListPalletBtn,
    addBtn,
    undoBtn,
    clearBtn,
    clearLookupBtn,
    importMergeBtn,
    exportDataBtn
  ];
  guardedElements.forEach(el => {
    if (!el) return;
    el.disabled = !enabled;
  });
  tabButtons.forEach(btn => {
    if (!btn) return;
    btn.disabled = !enabled;
  });
}

function enforceLookupGate(showStatus = true) {
  const enabled = hasLookupData();
  setFeaturesEnabled(enabled);
  if (!enabled && showStatus) {
    setStatus("Upload a lookup file first to unlock scanner features.", "warn");
  }
  return enabled;
}


function addEntry() {
  const rawSerialValue = (serialInput.value ?? "").toString().trim();
  const scannedPayload = parsePalletQrTransferPayload(rawSerialValue);
  if (scannedPayload) {
    importPalletFromQrPayload(scannedPayload);
    return;
  }
  if (!enforceLookupGate()) return;
  const sn = normalize(rawSerialValue);
  let pnr = normalize(pnrInput.value);
  const initials = normalize(initialsInput.value);
  const palletId = normalize(currentPalletId);
  if (!initials) {
    setStatus("Please enter your initials before scanning.", "err");
    initialsInput.focus();
    return;
  }
  if (!sn) {
    setStatus("Please scan or enter a Serial Number first.", "err");
    serialInput.focus();
    return;
  }

  const existingScan = scans.find(x => x.serial === sn);
  if (existingScan) {
    playDuplicateSound();
    setStatus(`Blocked duplicate: Serial ${sn} was already scanned in pallet ${existingScan.palletId || existingScan.rack || "(blank)"} at ${existingScan.ts || "(unknown time)"}.`, "err");
    serialInput.select?.();
    serialInput.focus();
    return;
  }

  const lookedUpPnr = serialToPnr[sn] || "";
  const lookedUpBoxId = serialToBoxId[sn] || "";
  const lookupFound = !!lookedUpPnr;
  const isNotInList = !lookupFound;
  if (!pnr && lookupFound) pnr = lookedUpPnr;

  if (!pnr) {
    if (isNotInList) {
      playNotInListSound();
      alert(`Serial ${sn} is not in the uploaded lookup list. Please scan the GPN / PN-R manually for this unit.`);
      setStatus(`Serial ${sn} is not in list. Scan GPN/PN-R manually to route it into a Not In List pallet.`, "err");
    } else {
      alert(`No GPN / PN-R was found in the lookup for serial: ${sn}. Please scan the PN-R / GPN now.`);
      setStatus(`No GPN found for serial ${sn}. Scan the PN-R / GPN in the PN-R field to continue.`, "err");
    }
    pnrInput.focus();
    pnrInput.select?.();
    return;
  }

  let targetPalletId = palletId;
  let targetLock = "";
  if (isNotInList) {
    playNotInListSound();
    targetPalletId = resolveNotInListPalletForScan();
    targetLock = getPalletLockGpn(targetPalletId);
    if (targetLock && pnr !== targetLock) {
      setStatus(
        `Not In List pallet lock active: ${targetPalletId} is locked to PN-R/GPN ${targetLock}.`,
        "err"
      );
      pnrInput.focus();
      pnrInput.select?.();
      return;
    }
  } else {
    if (!targetPalletId) {
      setStatus("Start a new pallet before scanning.", "err");
      addRackBtn.focus();
      return;
    }
    if (currentPalletGpnLock && pnr !== currentPalletGpnLock) {
      setStatus(
        `Pallet lock active: ${targetPalletId} is locked to PN-R/GPN ${currentPalletGpnLock}. Start a new pallet for ${pnr}.`,
        "err"
      );
      pnrInput.focus();
      pnrInput.select?.();
      return;
    }
    if (!currentPalletGpnLock) {
      currentPalletGpnLock = pnr;
      persistActivePalletState();
    }
  }

  scans.push({
    ts: nowStamp(),
    serial: sn,
    l10BoxId: lookedUpBoxId,
    pnr,
    initials,
    palletId: targetPalletId,
    rack: targetPalletId,
    lookupFound,
    duplicate: false
  });
  persistScans();
  updateActivePalletState();
  renderAll();

  setStatus(
    isNotInList
      ? `Not In List routed to ${targetPalletId}: ${sn} → ${pnr}`
      : `Added to ${targetPalletId}: ${sn} → ${pnr}${lookedUpBoxId ? ` (${lookedUpBoxId})` : ""}`,
    isNotInList ? "warn" : "ok"
  );

  cancelAutoSubmitTimer();
  serialInput.value = "";
  pnrInput.value = "";
  serialInput.focus();
}

function undoLast() {
  if (!scans.length) {
    setStatus("Nothing to undo.", "warn");
    return;
  }
  const removed = scans.pop();
  persistScans();
  updateActivePalletState();
  renderAll();
  setStatus(`Removed last entry: ${removed.serial} → ${removed.pnr}`, "warn");
  serialInput.focus();
}

function clearAll() {
  if (!confirm("Clear all scanned entries? This cannot be undone.")) return;
  scans = [];
  persistScans();
  palletRegistry = [];
  persistPalletRegistry();
  palletQrCache.clear();
  expandedPallets.clear();
  expandedExplorerPallets.clear();
  expandedExplorerBoxes.clear();
  activeNotInListPalletId = "";
  persistActiveNotInListPalletId();
  setActivePallet("", "");
  updateActivePalletState();
  renderAll();
  setStatus("All scanned entries cleared.", "warn");
  serialInput.focus();
}

function persistScans() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scans));
}

function loadScans() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    console.warn(e);
    return [];
  }
}

function loadLookupMap() {
  try {
    const raw = localStorage.getItem(LOOKUP_MAP_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};
    const cleaned = {};
    Object.entries(parsed).forEach(([serial, pnr]) => {
      const sn = normalize(serial);
      const pn = normalize(pnr);
      if (sn && pn) cleaned[sn] = pn;
    });
    return cleaned;
  } catch {
    return {};
  }
}

function loadLookupBoxMap() {
  try {
    const raw = localStorage.getItem(LOOKUP_BOX_MAP_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};
    const cleaned = {};
    Object.entries(parsed).forEach(([serial, boxId]) => {
      const sn = normalize(serial);
      const bx = formatBoxIdDisplay(boxId);
      if (sn && bx) cleaned[sn] = bx;
    });
    return cleaned;
  } catch {
    return {};
  }
}

function persistLookupMap() {
  try {
    localStorage.setItem(LOOKUP_MAP_KEY, JSON.stringify(serialToPnr));
    localStorage.setItem(LOOKUP_BOX_MAP_KEY, JSON.stringify(serialToBoxId));
  } catch {}
}

function getSummaryRows() {
  const counts = new Map();
  for (const row of scans) {
    const key = row.pnr || "(BLANK)";
    counts.set(key, (counts.get(key)||0)+1);
  }
  return Array.from(counts.entries())
    .sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]))
    .map(([pnr,count])=>({pnr,count}));
}

function renderSummary() {
  const rows = getSummaryRows();
  summaryTbody.innerHTML = "";
  if (!rows.length) {
    summaryTbody.innerHTML = `<tr><td colspan="3" class="muted">No scans yet.</td></tr>`;
    return;
  }
  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${escapeHtml(r.pnr)}</td>
      <td class="right">${r.count}</td>
    `;
    summaryTbody.appendChild(tr);
  });
}

function renderDetails() {
  if (!detailsTbody || !filterInput) return;
  const q = normalize(filterInput.value);
  detailsTbody.innerHTML = "";
  let rows = scans;
  if (q) {
    rows = scans.filter(r => (r.serial+" "+r.pnr+" "+(r.initials||"")+" "+(r.palletId || r.rack || "")).includes(q));
  }
  if (!rows.length) {
    detailsTbody.innerHTML = `<tr><td colspan="8" class="muted">${q ? "No matching scans." : "No scans yet."}</td></tr>`;
    return;
  }
  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    if (r.duplicate) tr.classList.add("row-dup");
    if (!r.lookupFound) tr.classList.add("row-notfound");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${escapeHtml(r.ts || "")}</td>
      <td>${escapeHtml(r.serial || "")}</td>
      <td>${escapeHtml(r.pnr || "")}</td>
      <td>${escapeHtml(r.initials || "")}</td>
      <td>${escapeHtml(r.palletId || r.rack || "")}</td>
      <td>${r.lookupFound ? "Yes" : "No"}</td>
      <td>${r.duplicate ? "Yes" : "No"}</td>
    `;
    detailsTbody.appendChild(tr);
  });
}

function getPalletGroups() {
  const groups = new Map();
  palletRegistry.forEach(id => {
    if (!groups.has(id)) groups.set(id, []);
  });
  if (currentPalletId && !groups.has(currentPalletId)) groups.set(currentPalletId, []);
  for (const r of scans) {
    const palletId = normalize(r.palletId || r.rack) || "(BLANK)";
    if (!groups.has(palletId)) groups.set(palletId, []);
    groups.get(palletId).push(r);
  }
  return Array.from(groups.entries())
    .map(([palletId, rows]) => ({
      palletId,
      rows,
      total: rows.length,
      uniqueSerials: new Set(rows.map(x => x.serial || "")).size,
      uniquePnrs: new Set(rows.map(x => x.pnr || "")).size,
      uniqueBoxes: new Set(rows.map(x => normalize(x.l10BoxId || "")).filter(Boolean)).size
    }))
    .sort((a,b)=> b.total-a.total || a.palletId.localeCompare(b.palletId));
}

function renderPallets() {
  if (!racksTbody) return;
  const groups = getPalletGroups();
  racksTbody.innerHTML = "";
  if (!groups.length) {
    racksTbody.innerHTML = `<tr><td colspan="6" class="muted">No pallets scanned yet.</td></tr>`;
    return;
  }
  groups.forEach((g, i) => {
    const isOpen = expandedPallets.has(g.palletId);
    const tr = document.createElement("tr");
    tr.className = "rack-row";
    tr.dataset.rack = g.palletId;
    tr.innerHTML = `
      <td>${i+1}</td>
      <td><strong>${escapeHtml(g.palletId)}</strong></td>
      <td class="right">${g.total}</td>
      <td class="right">${g.uniqueSerials}</td>
      <td class="right">${g.uniquePnrs}</td>
      <td>${isOpen ? "Hide" : "Show"}</td>
    `;
    racksTbody.appendChild(tr);

    if (isOpen) {
      const detailsRow = document.createElement("tr");
      const serialRows = g.rows.slice().reverse().map((r, idx) => `
        <tr>
          <td>${idx+1}</td>
          <td>${escapeHtml(r.ts || "")}</td>
          <td>${escapeHtml(r.serial || "")}</td>
          <td>${escapeHtml(r.l10BoxId || "")}</td>
          <td>${escapeHtml(r.pnr || "")}</td>
          <td>${escapeHtml(r.initials || "")}</td>
          <td>${r.duplicate ? "Yes" : "No"}</td>
        </tr>`).join("");
      detailsRow.innerHTML = `
        <td colspan="6" class="rack-detail-cell">
          <table class="rack-subtable">
            <thead>
              <tr>
                <th style="width:50px;">#</th>
                <th>Timestamp</th>
                <th>Serial Number</th>
                <th>L10 Box ID</th>
                <th>PN-R</th>
                <th>Initials</th>
                <th style="width:90px;">Duplicate</th>
              </tr>
            </thead>
            <tbody>${serialRows}</tbody>
          </table>
        </td>`;
      racksTbody.appendChild(detailsRow);
    }
  });
}

function getPalletExplorerData() {
  return getPalletGroups().map(group => {
    const boxStats = new Map();
    group.rows.forEach(row => {
      const boxId = normalize(row.l10BoxId || "") || "(NO BOX ID)";
      const sn = normalize(row.serial || "");
      const gpn = normalize(row.pnr || "");
      if (!boxStats.has(boxId)) {
        boxStats.set(boxId, {
          serials: new Set(),
          gpns: new Set(),
          unitCount: 0
        });
      }
      const stats = boxStats.get(boxId);
      stats.unitCount += 1;
      if (sn) stats.serials.add(sn);
      if (gpn) stats.gpns.add(gpn);
    });
    const boxes = Array.from(boxStats.entries())
      .map(([boxId, stats]) => ({
        boxId,
        serials: Array.from(stats.serials).sort(),
        gpns: Array.from(stats.gpns).sort(),
        unitCount: stats.unitCount
      }))
      .sort((a, b) => b.unitCount - a.unitCount || a.boxId.localeCompare(b.boxId));
    return {
      ...group,
      boxes
    };
  });
}

function escapeHtml(s) {
  return (s ?? "").toString()
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function xmlEscape(value) {
  return (value ?? "").toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function buildSpreadsheetMlWorkbook(sheets) {
  const workbookStart = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:html="http://www.w3.org/TR/REC-html40">
<Styles>
  <Style ss:ID="Default" ss:Name="Normal">
    <Alignment ss:Vertical="Bottom"/>
    <Borders/>
    <Font/>
    <Interior/>
    <NumberFormat/>
    <Protection/>
  </Style>
  <Style ss:ID="Header">
    <Font ss:Bold="1"/>
    <Interior ss:Color="#D9EAF7" ss:Pattern="Solid"/>
  </Style>
</Styles>`;

  const sheetXml = sheets.map(sheet => {
    const rowsXml = sheet.rows.map((row, rowIndex) => {
      const cellsXml = row.map(cell => {
        const isNum = typeof cell === "number" && Number.isFinite(cell);
        const type = isNum ? "Number" : "String";
        const style = rowIndex === 0 ? ` ss:StyleID="Header"` : "";
        return `<Cell${style}><Data ss:Type="${type}">${xmlEscape(cell)}</Data></Cell>`;
      }).join("");
      return `<Row>${cellsXml}</Row>`;
    }).join("\n");
    return `<Worksheet ss:Name="${xmlEscape((sheet.name || "Sheet").slice(0, 31))}"><Table>${rowsXml}</Table></Worksheet>`;
  }).join("\n");

  return `${workbookStart}\n${sheetXml}\n</Workbook>`;
}

function downloadFile(filename, content, type = "text/plain;charset=utf-8") {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function parseCsvLine(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === "," && !inQuotes) {
      out.push(cur);
      cur = "";
    } else {
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}

function parseCsv(text) {
  const rows = [];
  let line = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i + 1] === '"') {
        line += '""';
        i++;
      } else {
        inQuotes = !inQuotes;
        line += ch;
      }
    } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
      if (ch === "\r" && text[i + 1] === "\n") i++;
      if (line.length) rows.push(parseCsvLine(line));
      line = "";
    } else {
      line += ch;
    }
  }
  if (line.length) rows.push(parseCsvLine(line));
  return rows.filter(row => row.some(cell => String(cell || "").trim() !== ""));
}

function parseSpreadsheetMlRowsBySheet(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "application/xml");
  if (xml.querySelector("parsererror")) throw new Error("Invalid SpreadsheetML XML.");
  const ns = "urn:schemas-microsoft-com:office:spreadsheet";
  const worksheets = Array.from(xml.getElementsByTagNameNS(ns, "Worksheet"));
  const out = [];
  worksheets.forEach(ws => {
    const name = ws.getAttribute("ss:Name") || ws.getAttribute("Name") || "Sheet";
    const rowNodes = Array.from(ws.getElementsByTagNameNS(ns, "Row"));
    const rows = rowNodes.map(row => {
      const values = [];
      let currentIndex = 1;
      const cells = Array.from(row.getElementsByTagNameNS(ns, "Cell"));
      cells.forEach(cell => {
        const idxAttr = cell.getAttribute("ss:Index") || cell.getAttribute("Index");
        const targetIndex = idxAttr ? Number.parseInt(idxAttr, 10) : currentIndex;
        while (currentIndex < targetIndex) {
          values.push("");
          currentIndex++;
        }
        const dataNode = cell.getElementsByTagNameNS(ns, "Data")[0];
        values.push(dataNode ? (dataNode.textContent || "") : "");
        currentIndex++;
      });
      return values;
    });
    out.push({ name, rows });
  });
  return out;
}

function parseSheetJsWorkbookRowsBySheet(workbook) {
  const sheetNames = Array.isArray(workbook?.SheetNames) ? workbook.SheetNames : [];
  return sheetNames.map(name => {
    const sheet = workbook.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
    return { name, rows };
  });
}

async function parseWorkbookRowsBySheet(file) {
  if (!file) return [];
  const name = (file.name || "").toLowerCase();

  if (name.endsWith(".csv") || name.endsWith(".txt")) {
    const text = (await file.text()).replace(/^﻿/, "");
    return [{ name: "Sheet1", rows: parseCsv(text) }];
  }

  if (name.endsWith(".xml")) {
    const xmlText = (await file.text()).replace(/^﻿/, "");
    return parseSpreadsheetMlRowsBySheet(xmlText);
  }

  if (typeof XLSX === "undefined") {
    throw new Error("Excel parser failed to load.");
  }

  const buffer = await file.arrayBuffer();
  const workbook = XLSX.read(buffer, { type: "array" });
  return parseSheetJsWorkbookRowsBySheet(workbook);
}

function parseLookupMapFromRows(rows) {
  if (!rows.length) {
    return {
      pnrMap: {},
      boxMap: {},
      pnrCount: 0,
      boxCount: 0,
      skippedBlank: 0,
      pnrConflicts: 0,
      boxConflicts: 0
    };
  }
  const headerMap = {};
  rows[0].forEach((h, i) => {
    const key = normalizeImportHeader(h);
    if (key) headerMap[key] = i;
  });
  const serialKeys = ["SERIALNUMBER", "SERIAL", "SN", "SERIALNO"];
  const pnrKeys = ["PNR", "PNRGPN", "GPN", "PN", "PARTNUMBER", "PARTNO"];
  const boxKeys = ["L10BOXID", "BOXNUMBER", "BOXID", "BOXNO", "BOX"];
  const firstRowWidth = (rows[0] || []).length;
  const likelyMrbLayout = firstRowWidth >= 5;
  const serialIdx = serialKeys.find(k => headerMap[k] != null) != null
    ? headerMap[serialKeys.find(k => headerMap[k] != null)]
    : (likelyMrbLayout ? 4 : 0);
  const pnrIdx = pnrKeys.find(k => headerMap[k] != null) != null
    ? headerMap[pnrKeys.find(k => headerMap[k] != null)]
    : (likelyMrbLayout ? 3 : 1);
  const boxIdx = boxKeys.find(k => headerMap[k] != null) != null
    ? headerMap[boxKeys.find(k => headerMap[k] != null)]
    : (likelyMrbLayout ? 0 : null);
  const hasHeader = serialKeys.some(k => headerMap[k] != null) || pnrKeys.some(k => headerMap[k] != null) || boxKeys.some(k => headerMap[k] != null);
  const start = hasHeader ? 1 : 0;

  const pnrMap = {};
  const boxMap = {};
  let pnrCount = 0;
  let boxCount = 0;
  let skippedBlank = 0;
  let pnrConflicts = 0;
  let boxConflicts = 0;
  for (let i = start; i < rows.length; i++) {
    const row = rows[i] || [];
    const serial = normalize(row[serialIdx] ?? "");
    if (!serial) {
      skippedBlank++;
      continue;
    }
    const pnr = normalize(row[pnrIdx] ?? "");
    const rawBox = boxIdx == null ? "" : normalize(row[boxIdx] ?? "");
    const boxId = formatBoxIdDisplay(rawBox);
    if (pnr) {
      if (pnrMap[serial] && pnrMap[serial] !== pnr) pnrConflicts++;
      pnrMap[serial] = pnr;
      pnrCount++;
    }
    if (boxId) {
      if (boxMap[serial] && boxMap[serial] !== boxId) boxConflicts++;
      boxMap[serial] = boxId;
      boxCount++;
    }
  }
  return { pnrMap, boxMap, pnrCount, boxCount, skippedBlank, pnrConflicts, boxConflicts };
}

function mergeLookupMaps(baseMap, incomingMap) {
  let conflicts = 0;
  Object.entries(incomingMap).forEach(([serial, pnr]) => {
    if (baseMap[serial] && baseMap[serial] !== pnr) conflicts++;
    baseMap[serial] = pnr;
  });
  return conflicts;
}

async function handleLookupFileUpload(file) {
  if (!file) return;
  try {
    const sheets = await parseWorkbookRowsBySheet(file);
    let parsed = { pnrMap: {}, boxMap: {}, pnrCount: 0, boxCount: 0, skippedBlank: 0, pnrConflicts: 0, boxConflicts: 0 };
    const aggregatePnr = {};
    const aggregateBox = {};
    let pnrCount = 0;
    let boxCount = 0;
    let skippedBlank = 0;
    let pnrConflicts = 0;
    let boxConflicts = 0;
    sheets.forEach(sheet => {
      const part = parseLookupMapFromRows(sheet.rows || []);
      pnrCount += part.pnrCount;
      boxCount += part.boxCount;
      skippedBlank += part.skippedBlank;
      pnrConflicts += part.pnrConflicts;
      boxConflicts += part.boxConflicts;
      pnrConflicts += mergeLookupMaps(aggregatePnr, part.pnrMap);
      boxConflicts += mergeLookupMaps(aggregateBox, part.boxMap);
    });
    parsed = { pnrMap: aggregatePnr, boxMap: aggregateBox, pnrCount, boxCount, skippedBlank, pnrConflicts, boxConflicts };

    const pnrEntryCount = Object.keys(parsed.pnrMap).length;
    const boxEntryCount = Object.keys(parsed.boxMap).length;
    const entryCount = Math.max(pnrEntryCount, boxEntryCount);
    if (!entryCount) {
      setStatus("Lookup upload failed. No Serial → PN-R / Box mappings were found.", "err");
      return;
    }

    serialToPnr = parsed.pnrMap;
    serialToBoxId = parsed.boxMap;
    persistLookupMap();
    renderMetrics();
    autoFillPNR();
    enforceLookupGate(false);
    setStatus(
      `Lookup file loaded: PN-R ${pnrEntryCount}, L10 Box ID ${boxEntryCount} (${parsed.pnrConflicts + parsed.boxConflicts} conflicts overwritten, ${parsed.skippedBlank} blank rows skipped).`,
      "ok"
    );
  } catch (e) {
    console.error(e);
    setStatus("Lookup upload failed. File could not be parsed.", "err");
  } finally {
    if (lookupFileInput) lookupFileInput.value = "";
  }
}

function clearLookupMap() {
  serialToPnr = {};
  serialToBoxId = {};
  persistLookupMap();
  renderMetrics();
  autoFillPNR();
  enforceLookupGate(false);
  setStatus("Lookup map cleared. PN-R and L10 Box ID auto-fill now require a loaded lookup file.", "warn");
}

function normalizeImportHeader(value) {
  return normalize(value).replace(/[^A-Z0-9]+/g, "");
}

function parseRecordsFromRows(rows) {
  if (!rows.length) return { records: [], skippedBlank: 0 };
  const headerMap = {};
  rows[0].forEach((h, i) => {
    const key = normalizeImportHeader(h);
    if (key) headerMap[key] = i;
  });
  const get = (row, keys) => {
    for (const key of keys) {
      if (headerMap[key] != null) return row[headerMap[key]] ?? "";
    }
    return "";
  };

  const serialKeys = ["SERIALNUMBER", "SERIAL", "SN"];
  const pnrKeys = ["PNR", "PNRGPN", "GPN", "PN"];
  const initialsKeys = ["INITIALS", "USERINITIALS", "OPERATOR", "TECHNICIAN"];
  const rackKeys = ["PALLETID", "PALLET", "RACK", "RACKID", "RACKNAME"];
  const boxIdKeys = ["L10BOXID", "BOXID", "BOXNUMBER", "L10BOX", "BOX"];
  const tsKeys = ["TIMESTAMP", "TIME", "DATE", "DATETIME"];
  const lookupKeys = ["LOOKUPFOUND", "LOOKUP", "FOUNDINLOOKUP"];
  const duplicateKeys = ["DUPLICATE", "ISDUPLICATE"];

  if (!serialKeys.some(k => headerMap[k] != null)) return { records: [], skippedBlank: rows.length > 1 ? rows.length - 1 : 0 };

  let skippedBlank = 0;
  const records = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const serial = normalize(get(row, serialKeys));
    if (!serial) {
      skippedBlank++;
      continue;
    }
    const rawLookup = normalize(get(row, lookupKeys));
    const rawDup = normalize(get(row, duplicateKeys));
    const palletId = normalize(get(row, rackKeys));
    records.push({
      ts: (get(row, tsKeys) || "").toString().trim() || nowStamp(),
      serial,
      l10BoxId: formatBoxIdDisplay(get(row, boxIdKeys)),
      pnr: normalize(get(row, pnrKeys)),
      initials: normalize(get(row, initialsKeys)),
      palletId,
      rack: palletId,
      lookupFound: rawLookup === "YES" || rawLookup === "TRUE" || rawLookup === "1",
      duplicate: rawDup === "YES" || rawDup === "TRUE" || rawDup === "1"
    });
  }
  return { records, skippedBlank };
}

function mergeImportedRecords(records, skippedBlank = 0) {
  const bySerial = new Map(scans.map(row => [normalize(row.serial), row]));
  let added = 0;
  let updated = 0;
  let skippedDupes = 0;

  records.forEach(record => {
    const key = normalize(record.serial);
    if (!key) return;
    const existing = bySerial.get(key);
    if (!existing) {
      const lookedUp = normalize(serialToPnr[key] || "");
      const lookedUpBox = serialToBoxId[key] || "";
      const palletId = normalize(record.palletId || record.rack);
      scans.push({
        ts: record.ts || nowStamp(),
        serial: key,
        l10BoxId: record.l10BoxId || lookedUpBox,
        pnr: record.pnr || lookedUp,
        initials: record.initials || "",
        palletId,
        rack: palletId,
        lookupFound: record.lookupFound || !!lookedUp,
        duplicate: !!record.duplicate
      });
      bySerial.set(key, scans[scans.length - 1]);
      added++;
      return;
    }

    let changed = false;
    if (!existing.l10BoxId && (record.l10BoxId || serialToBoxId[key])) {
      existing.l10BoxId = record.l10BoxId || serialToBoxId[key];
      changed = true;
    }
    if (!existing.pnr && record.pnr) { existing.pnr = record.pnr; changed = true; }
    if (!existing.initials && record.initials) { existing.initials = record.initials; changed = true; }
    const incomingPalletId = normalize(record.palletId || record.rack);
    if ((!existing.palletId && !existing.rack) && incomingPalletId) {
      existing.palletId = incomingPalletId;
      existing.rack = incomingPalletId;
      changed = true;
    }
    if (!existing.ts && record.ts) { existing.ts = record.ts; changed = true; }
    if (record.lookupFound && !existing.lookupFound) { existing.lookupFound = true; changed = true; }
    if (record.duplicate && !existing.duplicate) { existing.duplicate = true; changed = true; }
    if (changed) updated++;
    else skippedDupes++;
  });

  persistScans();
  renderAll();
  setStatus(`Merge complete. Added ${added}, updated ${updated}, skipped ${skippedDupes} duplicates, skipped ${skippedBlank} blank row(s).`, (added || updated) ? "ok" : "warn");
}

function exportDataWorkbook() {
  const summaryRows = [["PN-R", "Count"], ...getSummaryRows().map(r => [r.pnr, r.count])];
  const rackRows = [["Pallet ID","Timestamp","Serial Number","L10 Box ID","PN-R","Initials","Duplicate","Lookup Found"]];
  getPalletGroups().forEach(group => {
    group.rows.slice().reverse().forEach((r, idx) => {
      rackRows.push([
        idx === 0 ? group.palletId : "",
        r.ts || "",
        r.serial || "",
        r.l10BoxId || "",
        r.pnr || "",
        r.initials || "",
        r.duplicate ? "Yes" : "No",
        r.lookupFound ? "Yes" : "No"
      ]);
    });
  });
  if (rackRows.length === 1) rackRows.push(["(No pallets scanned)","","","","","","",""]);

  if (typeof XLSX !== "undefined") {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), "Summary By PN-R");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rackRows), "Pallets");
    const wbArray = XLSX.write(wb, { bookType: "xlsx", type: "array" });
    downloadFile(`inventory_merge_${Date.now()}.xlsx`, wbArray, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    setStatus("Exported merge workbook (.xlsx) with Summary and Pallets sheets.", "ok");
    return;
  }

  const workbook = buildSpreadsheetMlWorkbook([
    { name: "Summary By PN-R", rows: summaryRows },
    { name: "Pallets", rows: rackRows }
  ]);
  downloadFile(`inventory_merge_${Date.now()}.xls`, workbook, "application/vnd.ms-excel;charset=utf-8");
  setStatus("Exported merge workbook (.xls) with Summary and Pallets sheets.", "ok");
}

function formatPalletGpnHeader(rows) {
  const gpns = Array.from(new Set(rows.map(row => normalize(row.pnr || "")).filter(Boolean))).sort();
  if (!gpns.length) return "-";
  if (gpns.length === 1) return gpns[0];
  return `MULTIPLE (${gpns.join(", ")})`;
}

  return `

            <div class="qr-box">
              ${qrDataUrl
                ? `<img src="${qrDataUrl}" width="78" height="78" style="width:78px;height:78px;display:block;" alt="QR ${escapeHtml(palletId)}" />`
                : '<div class="qr-label">QR<br/>CODE</div>'}
            </div>
          </td>
        </tr>
      </table>
      <div class="divider">- - - - - - - - - - - - - - - - - - - - - - -</div>
      <div class="sheet-body">
        ${boxBlocks || '<div class="box-block"><div class="box-title">Box - (NO BOX ID)</div><div class="pairs-wrap"><div class="pair-line muted">-</div></div></div>'}
      </div>
    </section>
  `;
}

function buildPalletWordDocument(sheetSections) {
  return `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
  <meta charset="utf-8" />
  <title>Pallet Explorer Print</title>
  <style>
    @page { size: Letter; margin: 0.45in; }
    body, table, td, div, span {
      font-family: Calibri, Arial, sans-serif;
      font-size: 11pt;
      color: #111;
    }
    .pallet-sheet { page-break-after: always; margin-bottom: 14px; }
    .pallet-sheet:last-child { page-break-after: auto; }
    .header-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .header-cell { vertical-align: top; }
    .qr-cell { width: 98px; vertical-align: top; text-align: right; }
    .sheet-header { display: block; }
    .header-line { line-height: 1.3; margin-bottom: 5px; }
    .qty { margin-left: 16px; }
    .qr-box {
      width: 86px; height: 86px;
      border: 1px solid #111;
      margin-left: auto;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      font-weight: 700;
      font-size: 11pt;
    }
    .qr-box img { width: 78px; height: 78px; object-fit: contain; margin: 3px auto; }
    .qr-label { letter-spacing: 0.5px; line-height: 1.2; }
    .divider { margin: 16px 0 14px; color: #444; letter-spacing: 2px; }
    .box-block { margin: 0 0 22px; }
    .box-title { margin-bottom: 7px; }
    .pairs-wrap { margin-left: 20px; }
    .pair-line { line-height: 1.35; }
    .sn { margin-left: 10px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  ${sheetSections}
</body>
</html>`;
}

async function exportPalletExplorerWord() {
  const palletGroups = getPalletGroups();
  if (!palletGroups.length) {
    setStatus("Word export skipped. No pallets found in the 3rd tab.", "warn");
    return;
  }

  const sections = [];
  for (const group of palletGroups) {
    let qrDataUrl = "";
    try {
      qrDataUrl = await getPalletQrUrl(group.palletId);
    } catch {}
    sections.push(buildPalletWordSection(group, qrDataUrl));
  }

  const docHtml = buildPalletWordDocument(sections.join("\n"));
  downloadFile(`pallet_explorer_print_${Date.now()}.doc`, docHtml, "application/msword;charset=utf-8");
  setStatus(`Exported ${palletGroups.length} pallet sheet(s) to Word (.doc).`, "ok");
}

async function handleImportMergeFile(file) {
  if (!file) return;
  try {
    const sheets = await parseWorkbookRowsBySheet(file);
    if (!sheets.length) {
      setStatus("Import failed. No sheets found in the selected file.", "err");
      return;
    }
    let target = sheets.find(s => /merge data/i.test(s.name));
    if (!target) target = sheets.find(s => /pallets|racks|exported scans/i.test(s.name));
    if (!target) target = sheets[0];
    const { records, skippedBlank } = parseRecordsFromRows(target.rows || []);
    if (!records.length) {
      setStatus("Import failed. No readable scan rows were found in the file.", "err");
      return;
    }
    mergeImportedRecords(records, skippedBlank);
  } catch (e) {
    console.error(e);
    setStatus(`Import failed. ${(e && e.message) ? e.message : "The file could not be read."}`, "err");
  } finally {
    if (importMergeFileInput) importMergeFileInput.value = "";
  }
}

let autoSubmitTimer = null;
function cancelAutoSubmitTimer() {
  if (autoSubmitTimer) {
    clearTimeout(autoSubmitTimer);
    autoSubmitTimer = null;
  }
}

function scheduleAutoSubmit(source = "serial") {
  cancelAutoSubmitTimer();
  if (!hasLookupData()) return;
  if (!isAutoSubmitEnabled()) return;

  const rawSerial = (serialInput.value ?? "").toString().trim();
  if (isPalletQrTransferPayloadCandidate(rawSerial)) return;
  const sn = normalize(rawSerial);
  if (!sn) return;

  autoSubmitTimer = setTimeout(() => {
    autoSubmitTimer = null;
    const stillSn = normalize(serialInput.value);
    const stillPnr = normalize(pnrInput.value);
    if (!stillSn) return;

    const existingScan = scans.find(x => x.serial === stillSn);
    if (existingScan) {
      playDuplicateSound();
      setStatus(`Duplicate detected (not submitted): Serial ${stillSn} already exists in pallet ${existingScan.palletId || existingScan.rack || "(blank)"} at ${existingScan.ts || "(unknown time)"}.`, "err");
      serialInput.select?.();
      serialInput.focus();
      return;
    }

    const lookedUpPnr = serialToPnr[stillSn] || "";
    if (source === "serial") {
      autoFillPNR();
      if (!lookedUpPnr) return;
    }

    if (!stillPnr && !lookedUpPnr) return;

    addEntry();
  }, 450);
}

serialInput.addEventListener("input", () => {
  autoFillPNR();
  scheduleAutoSubmit("serial");
});
serialInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    autoFillPNR();
    addEntry();
  }
});

pnrInput.addEventListener("input", () => {
  if (!isAutoSubmitEnabled()) return;
  const sn = normalize(serialInput.value);
  const manualPnr = normalize(pnrInput.value);
  if (!sn || !manualPnr) return;
  if (serialToPnr[sn]) return;
  scheduleAutoSubmit("pnr");
});

pnrInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    addEntry();
  }
});

initialsInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    serialInput.focus();
  }
});

if (qrTransferInput) {
  qrTransferInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      importPalletFromQrTransferInput();
    }
  });
}

rackInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    serialInput.focus();
  }
});

addRackBtn.addEventListener("click", startNewPallet);
if (closeNotInListPalletBtn) closeNotInListPalletBtn.addEventListener("click", () => closeActiveNotInListPallet());
addBtn.addEventListener("click", addEntry);
undoBtn.addEventListener("click", undoLast);
clearBtn.addEventListener("click", clearAll);
if (loadLookupBtn && lookupFileInput) {
  loadLookupBtn.addEventListener("click", () => lookupFileInput.click());
  lookupFileInput.addEventListener("change", (e) => handleLookupFileUpload(e.target.files?.[0] || null));
}
if (clearLookupBtn) clearLookupBtn.addEventListener("click", clearLookupMap);
if (exportDataBtn) exportDataBtn.addEventListener("click", exportDataWorkbook);
if (exportExplorerWordBtn) exportExplorerWordBtn.addEventListener("click", exportPalletExplorerWord);
if (importMergeBtn && importMergeFileInput) {
  importMergeBtn.addEventListener("click", () => importMergeFileInput.click());
  importMergeFileInput.addEventListener("change", (e) => handleImportMergeFile(e.target.files?.[0] || null));
}
if (filterInput) filterInput.addEventListener("input", renderDetails);

if (racksTbody) {
  racksTbody.addEventListener("click", (e) => {
    const row = e.target.closest("tr.rack-row");
    if (!row) return;
    const palletId = row.dataset.rack || "";
    if (!palletId) return;
    if (expandedPallets.has(palletId)) expandedPallets.delete(palletId);
    else expandedPallets.add(palletId);
    renderPallets();
  });
}

if (explorerTbody) {
  explorerTbody.addEventListener("click", (e) => {
    const boxRow = e.target.closest("tr.explorer-box-row");
    if (boxRow?.dataset?.boxKey) {
      const boxKey = boxRow.dataset.boxKey;
      if (expandedExplorerBoxes.has(boxKey)) expandedExplorerBoxes.delete(boxKey);
      else expandedExplorerBoxes.add(boxKey);
      renderPalletExplorer();
      return;
    }

    const palletRow = e.target.closest("tr.explorer-pallet-row");
    if (!palletRow?.dataset?.palletId) return;
    const palletId = palletRow.dataset.palletId;
    if (expandedExplorerPallets.has(palletId)) expandedExplorerPallets.delete(palletId);
    else expandedExplorerPallets.add(palletId);
    renderPalletExplorer();
  });
}

function activateTab(tabId) {
  const target = tabButtons.find(btn => btn.dataset.tab === tabId);
  if (!target || target.disabled) return;
  tabButtons.forEach(btn => btn.classList.remove("active"));
  target.classList.add("active");
  document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.add("hidden"));
  document.getElementById(tabId)?.classList.remove("hidden");
  if (qrTransferField) {
    const showOnExplorer = tabId === "explorerTab";
    qrTransferField.classList.toggle("hidden", !showOnExplorer);
    if (!showOnExplorer && qrTransferInput) qrTransferInput.value = "";
  }
}

tabButtons.forEach(btn => {
  btn.addEventListener("click", () => activateTab(btn.dataset.tab));
});

initializeAutoSubmitToggle();
updateActivePalletState();
enforceLookupGate();
mapCountEl.textContent = Math.max(Object.keys(serialToPnr).length, Object.keys(serialToBoxId).length).toLocaleString();
renderAll();
serialInput.focus();
</script>
</body>
</html>
